<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>処方箋 合計量計算</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0f4f8;
    --surface: #ffffff;
    --surface2: #f8fafc;
    --border: #dde3ea;
    --accent: #1a6eb5;
    --accent-light: #e8f1fb;
    --accent2: #0d9488;
    --text: #1e293b;
    --text-muted: #64748b;
    --danger: #ef4444;
    --shadow: 0 2px 12px rgba(0,0,0,0.07);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.10);
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0 0 32px;
  }

  header {
    background: var(--accent);
    color: white;
    padding: 20px 24px 18px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 2px 16px rgba(26,110,181,0.18);
  }

  header .logo {
    width: 36px; height: 36px;
    background: rgba(255,255,255,0.2);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }

  header h1 {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.02em;
  }

  header p {
    font-size: 12px;
    opacity: 0.8;
    margin-top: 1px;
  }

  .container {
    max-width: 860px;
    margin: 0 auto;
    padding: 28px 32px 0;
  }

  .section-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 10px;
  }

  /* 薬追加カード */
  .add-card {
    background: var(--surface);
    border: 1.5px dashed var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 16px;
  }

  .search-wrap {
    position: relative;
    margin-bottom: 14px;
  }

  .search-wrap input {
    width: 100%;
    padding: 11px 14px 11px 38px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 14px;
    font-family: inherit;
    background: var(--surface2);
    outline: none;
    transition: border-color 0.2s;
  }

  .search-wrap input:focus {
    border-color: var(--accent);
    background: white;
  }

  .search-icon {
    position: absolute;
    left: 11px; top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    font-size: 16px;
    pointer-events: none;
  }

  .dropdown {
    position: absolute;
    top: calc(100% + 4px);
    left: 0; right: 0;
    background: white;
    border: 1.5px solid var(--accent);
    border-radius: 8px;
    max-height: 220px;
    overflow-y: auto;
    z-index: 100;
    box-shadow: var(--shadow-lg);
    display: none;
  }

  .dropdown.open { display: block; }

  .dropdown-item {
    padding: 10px 14px;
    cursor: pointer;
    font-size: 13px;
    border-bottom: 1px solid #f1f5f9;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: background 0.12s;
  }

  .dropdown-item:last-child { border-bottom: none; }
  .dropdown-item:hover { background: var(--accent-light); }
  .dropdown-item .drug-name { font-weight: 500; }
  .dropdown-item .drug-unit {
    font-size: 11px;
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
  }

  .input-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    margin-bottom: 14px;
  }

  .input-group label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    margin-bottom: 5px;
    letter-spacing: 0.03em;
  }

  .input-group input {
    width: 100%;
    padding: 9px 12px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 14px;
    font-family: 'DM Mono', monospace;
    background: var(--surface2);
    outline: none;
    transition: border-color 0.2s;
    text-align: right;
  }

  .input-group input:focus {
    border-color: var(--accent);
    background: white;
  }

  .selected-drug-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--accent-light);
    color: var(--accent);
    border-radius: 6px;
    padding: 5px 10px;
    font-size: 12px;
    font-weight: 600;
    margin-bottom: 14px;
  }

  .selected-drug-badge button {
    background: none; border: none;
    color: var(--accent); cursor: pointer;
    font-size: 14px; line-height: 1;
    padding: 0; margin-left: 2px;
  }

  .btn-add {
    width: 100%;
    padding: 11px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-family: inherit;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    letter-spacing: 0.02em;
  }

  .btn-add:hover { background: #155fa0; }
  .btn-add:active { transform: scale(0.99); }
  .btn-add:disabled { background: #b0bec5; cursor: not-allowed; }

  /* 薬リスト */
  .drug-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 20px;
  }

  .drug-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
    gap: 12px;
    box-shadow: var(--shadow);
    animation: slideIn 0.2s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .drug-card-name {
    font-weight: 700;
    font-size: 14px;
    margin-bottom: 4px;
  }

  .drug-card-detail {
    font-size: 12px;
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
  }

  .drug-card-amounts {
    text-align: right;
  }

  .drug-card-total {
    font-family: 'DM Mono', monospace;
    font-size: 16px;
    font-weight: 700;
    color: var(--accent);
  }

  .drug-card-price {
    font-size: 12px;
    color: var(--accent2);
    font-family: 'DM Mono', monospace;
    margin-top: 2px;
  }

  .btn-remove {
    background: none;
    border: 1.5px solid var(--border);
    border-radius: 6px;
    color: var(--text-muted);
    cursor: pointer;
    width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    transition: border-color 0.15s, color 0.15s;
    align-self: start;
  }

  .btn-remove:hover { border-color: var(--danger); color: var(--danger); }

  /* 合計表示 */
  .summary-card {
    background: var(--accent);
    color: white;
    border-radius: var(--radius);
    padding: 22px 24px;
    box-shadow: 0 4px 24px rgba(26,110,181,0.25);
  }

  .summary-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    opacity: 0.75;
    margin-bottom: 14px;
  }

  .summary-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 8px 0;
    border-bottom: 1px solid rgba(255,255,255,0.15);
  }

  .summary-row:last-child { border-bottom: none; padding-bottom: 0; }

  .summary-row-label {
    font-size: 13px;
    opacity: 0.85;
  }

  .summary-row-value {
    font-family: 'DM Mono', monospace;
    font-size: 22px;
    font-weight: 700;
  }

  .summary-row-value.large {
    font-size: 28px;
  }

  .summary-row-value span {
    font-size: 13px;
    font-weight: 400;
    opacity: 0.75;
    margin-left: 3px;
  }

  .empty-state {
    text-align: center;
    padding: 32px 0;
    color: var(--text-muted);
    font-size: 13px;
  }

  .empty-state .icon { font-size: 32px; margin-bottom: 8px; }

  .notice {
    background: #fffbeb;
    border: 1px solid #fcd34d;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 12px;
    color: #92400e;
    margin-bottom: 20px;
    line-height: 1.6;
  }



  @media (max-width: 500px) {
    .input-row { grid-template-columns: 1fr 1fr; }
    .summary-row-value.large { font-size: 22px; }
  }
  @media (min-width: 768px) {
    header h1 { font-size: 22px; }
    header p { font-size: 14px; }
    .add-card { padding: 28px; }
    .drug-card { padding: 18px 22px; }
    .drug-card-name { font-size: 15px; }
    .summary-card { padding: 28px 32px; }
    .btn-add { font-size: 15px; padding: 13px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">💊</div>
  <div>
    <h1>処方箋 合計量・金額 計算</h1>
    <p>お薬の銘柄と用量を入力してください</p>
  </div>
</header>

<div class="container">

  <div class="notice">
    ⚠️ この計算はあくまで参考値です。正確な金額・用量は薬剤師にご確認ください。
  </div>

  <!-- 薬追加フォーム -->
  <p class="section-label">お薬を追加</p>
  <div class="add-card">

    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="薬の銘柄名を入力（例：ロキソプロフェン）" autocomplete="off">
      <div class="dropdown" id="dropdown"></div>
    </div>

    <div id="selectedBadge" style="display:none">
      <div class="selected-drug-badge">
        <span id="selectedName"></span>
        <button onclick="clearSelected()">✕</button>
      </div>
    </div>

    <!-- ラジオボタン -->
    <div style="display:flex;gap:20px;margin-bottom:14px;align-items:center">
      <label style="display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600;cursor:pointer">
        <input type="radio" name="unitMode" value="day" checked onchange="switchUnit(this.value)">
        日単位
      </label>
      <label style="display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600;cursor:pointer">
        <input type="radio" name="unitMode" value="month" onchange="switchUnit(this.value)">
        月単位
      </label>
    </div>

    <!-- 日単位入力 -->
    <div id="dayRow" class="input-row" style="grid-template-columns:auto 1fr 1fr;align-items:end">
      <div class="input-group">
        <label>用法</label>
        <div style="display:flex;align-items:center;gap:6px">
          <input type="number" id="timesPerDay" min="1" max="10" placeholder="3" style="width:52px;flex-shrink:0;padding:9px 8px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-family:'DM Mono',monospace;background:var(--surface2);outline:none;text-align:right">
          <span style="font-size:14px;color:var(--text);white-space:nowrap">日</span>
          <input type="number" id="timesPerDayCount" min="1" max="10" placeholder="3" style="width:52px;flex-shrink:0;padding:9px 8px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-family:'DM Mono',monospace;background:var(--surface2);outline:none;text-align:right">
          <span style="font-size:14px;color:var(--text);white-space:nowrap">回</span>
        </div>
      </div>
      <div class="input-group">
        <label>何日分</label>
        <input type="number" id="days" min="1" max="365" placeholder="例: 14">
      </div>
      <div class="input-group">
        <label>1回の量</label>
        <input type="text" id="amountPerTime" inputmode="decimal" placeholder="例: 1 または 1/2" onblur="convertFraction(this)">
      </div>
    </div>

    <!-- 月単位入力 -->
    <div id="monthRow" class="input-row" style="grid-template-columns:auto 1fr 1fr;align-items:end;display:none">
      <div class="input-group">
        <label>用法</label>
        <div style="display:flex;align-items:center;gap:6px">
          <input type="number" id="timesPerMonth" min="1" max="10" placeholder="3" disabled style="width:52px;flex-shrink:0;padding:9px 8px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-family:'DM Mono',monospace;background:var(--surface2);outline:none;text-align:right;opacity:0.4">
          <span style="font-size:14px;color:var(--text);white-space:nowrap">ヶ月</span>
          <input type="number" id="timesPerMonthCount" min="1" max="10" placeholder="3" disabled style="width:52px;flex-shrink:0;padding:9px 8px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-family:'DM Mono',monospace;background:var(--surface2);outline:none;text-align:right;opacity:0.4">
          <span style="font-size:14px;color:var(--text);white-space:nowrap">回</span>
        </div>
      </div>
      <div class="input-group">
        <label>何ヶ月分</label>
        <input type="number" id="months" min="1" max="24" placeholder="例: 3" disabled style="opacity:0.4">
      </div>
      <div class="input-group">
        <label>1回の量</label>
        <input type="text" id="amountPerTimeMonth" inputmode="decimal" placeholder="例: 1 または 1/2" disabled onblur="convertFraction(this)" style="opacity:0.4">
      </div>
    </div>

    <button class="btn-add" onclick="addDrug()" id="addBtn">＋ このお薬を追加</button>
  </div>

  <!-- 追加済み薬リスト -->
  <p class="section-label">追加済みのお薬</p>
  <div class="drug-list" id="drugList">
    <div class="empty-state">
      <div class="icon">📋</div>
      まだお薬が追加されていません
    </div>
  </div>

  <!-- 合計 -->
  <div class="summary-card" id="summaryCard" style="display:none">
    <div class="summary-title">処方合計</div>
    <div id="summaryRows"></div>
  </div>

</div>



<script>
// ====== サンプル薬品データ（実際はCSVから読み込む） ======
let drugMaster = [];

// CSVを自動読み込み
fetch('medicines.csv')
  .then(r => r.text())
  .then(text => {
    const lines = text.split('\n').filter(l => l.trim());
    drugMaster = lines.slice(1).map(line => {
      const cols = line.split(',').map(c => c.trim().replace(/^"|"$/g, ''));
      return { name: cols[0], unit: cols[1], pricePerUnit: parseFloat(cols[2]) || 0 };
    }).filter(d => d.name);
    console.log(`薬品データ読み込み完了: ${drugMaster.length}件`);
  })
  .catch(() => {
    console.warn('medicines.csv の読み込みに失敗しました');
  });

let selectedDrug = null;
let addedDrugs = [];



// 日/月単位切り替え
function switchUnit(mode) {
  const dayRow = document.getElementById('dayRow');
  const monthRow = document.getElementById('monthRow');
  const dayInputs = dayRow.querySelectorAll('input');
  const monthInputs = monthRow.querySelectorAll('input');

  if (mode === 'day') {
    dayRow.style.display = 'grid';
    monthRow.style.display = 'none';
    dayInputs.forEach(i => { i.disabled = false; i.style.opacity = '1'; });
    monthInputs.forEach(i => { i.disabled = true; i.style.opacity = '0.4'; });
  } else {
    dayRow.style.display = 'none';
    monthRow.style.display = 'grid';
    dayInputs.forEach(i => { i.disabled = true; i.style.opacity = '0.4'; });
    monthInputs.forEach(i => { i.disabled = false; i.style.opacity = '1'; });
  }
}


// 小数点以下の不要な0を除去
function fmtNum(val) {
  return parseFloat(parseFloat(val).toPrecision(10)).toString();
}

// 分数→小数変換（フォーカスが外れたとき）
function convertFraction(input) {
  const val = input.value.trim();
  if (val.includes('/')) {
    const parts = val.split('/');
    const num = parseFloat(parts[0]);
    const den = parseFloat(parts[1]);
    if (!isNaN(num) && !isNaN(den) && den !== 0) {
      input.value = parseFloat((num / den).toFixed(4));
    }
  }
}

// ====== 検索 ======
const searchInput = document.getElementById('searchInput');
const dropdown = document.getElementById('dropdown');

searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim();
  if (!q) { dropdown.classList.remove('open'); return; }
  const hits = drugMaster.filter(d => d.name.includes(q)).slice(0, 10);
  if (!hits.length) { dropdown.classList.remove('open'); return; }

  dropdown.innerHTML = hits.map((d, i) =>
    `<div class="dropdown-item" onclick="selectDrug(${drugMaster.indexOf(d)})">
      <span class="drug-name">${highlight(d.name, q)}</span>
      <span class="drug-unit">${d.unit} / ¥${d.pricePerUnit.toFixed(1)}</span>
    </div>`
  ).join('');
  dropdown.classList.add('open');
});

document.addEventListener('click', e => {
  if (!e.target.closest('.search-wrap')) dropdown.classList.remove('open');
});

function highlight(name, q) {
  return name.replace(new RegExp(q, 'g'), `<mark style="background:#dbeafe;color:#1d4ed8;border-radius:2px">${q}</mark>`);
}

function selectDrug(idx) {
  selectedDrug = drugMaster[idx];
  searchInput.value = '';
  dropdown.classList.remove('open');
  document.getElementById('selectedName').textContent = selectedDrug.name;
  document.getElementById('selectedBadge').style.display = 'block';
  searchInput.placeholder = '別の銘柄を検索...';
}

function clearSelected() {
  selectedDrug = null;
  document.getElementById('selectedBadge').style.display = 'none';
  searchInput.placeholder = '薬の銘柄名を入力（例：ロキソプロフェン）';
}

// ====== 薬を追加 ======
function addDrug() {
  if (!selectedDrug) { alert('銘柄を選択してください'); return; }
  const mode = document.querySelector('input[name="unitMode"]:checked').value;
  let daysPerUsage, times, amount, days, unitLabel;

  if (mode === 'day') {
    daysPerUsage = parseFloat(document.getElementById('timesPerDay').value);
    times = parseFloat(document.getElementById('timesPerDayCount').value);
    const amountRaw = document.getElementById('amountPerTime').value.trim();
    amount = amountRaw.includes('/') ? parseFloat(amountRaw.split('/')[0]) / parseFloat(amountRaw.split('/')[1]) : parseFloat(amountRaw);
    days = parseFloat(document.getElementById('days').value);
    unitLabel = '日分';
  } else {
    daysPerUsage = parseFloat(document.getElementById('timesPerMonth').value);
    times = parseFloat(document.getElementById('timesPerMonthCount').value);
    const amountRaw = document.getElementById('amountPerTimeMonth').value.trim();
    amount = amountRaw.includes('/') ? parseFloat(amountRaw.split('/')[0]) / parseFloat(amountRaw.split('/')[1]) : parseFloat(amountRaw);
    days = parseFloat(document.getElementById('months').value);
    unitLabel = 'ヶ月分';
  }

  if (!daysPerUsage || !times || !amount || !days) { alert('用法・1回の量・日数（月数）をすべて入力してください'); return; }

  const totalRaw = (times * days * amount) / daysPerUsage;
  const total = Math.round(totalRaw);
  const price = totalRaw * selectedDrug.pricePerUnit;

  addedDrugs.push({ ...selectedDrug, daysPerUsage, times, amount, days, total, totalRaw, price, unitLabel });
  renderList();
  renderSummary();

  // リセット
  clearSelected();
  document.getElementById('timesPerDay').value = '';
  document.getElementById('timesPerDayCount').value = '';
  document.getElementById('amountPerTime').value = '';
  document.getElementById('days').value = '';
  document.getElementById('timesPerMonth').value = '';
  document.getElementById('timesPerMonthCount').value = '';
  document.getElementById('amountPerTimeMonth').value = '';
  document.getElementById('months').value = '';
}

// ====== リスト描画 ======
function renderList() {
  const list = document.getElementById('drugList');
  if (!addedDrugs.length) {
    list.innerHTML = `<div class="empty-state"><div class="icon">📋</div>まだお薬が追加されていません</div>`;
    return;
  }
  list.innerHTML = addedDrugs.map((d, i) => `
    <div class="drug-card">
      <div>
        <div class="drug-card-name">${d.name}</div>
        <div class="drug-card-detail">${d.daysPerUsage}${d.unitLabel === 'ヶ月分' ? 'ヶ月' : '日'}${d.times}回 × ${fmtNum(d.amount)}${d.unit} × ${d.days}${d.unitLabel}</div>
      </div>
      <div style="display:flex;align-items:start;gap:12px">
        <div class="drug-card-amounts">
          <div class="drug-card-total">${d.total} <span style="font-size:12px;font-weight:400;color:#64748b">${d.unit}</span></div>
          <div class="drug-card-price">¥${Math.round(d.price).toLocaleString('ja-JP')}</div>
        </div>
        <button class="btn-remove" onclick="removeDrug(${i})">✕</button>
      </div>
    </div>
  `).join('');
}

function removeDrug(i) {
  addedDrugs.splice(i, 1);
  renderList();
  renderSummary();
}

// ====== 合計描画 ======
function renderSummary() {
  const card = document.getElementById('summaryCard');
  const rows = document.getElementById('summaryRows');
  if (!addedDrugs.length) { card.style.display = 'none'; return; }
  card.style.display = 'block';

  const totalPrice = addedDrugs.reduce((s, d) => s + d.price, 0);

  // 薬ごとの行 + 合計
  rows.innerHTML = addedDrugs.map(d =>
    `<div class="summary-row">
      <div class="summary-row-label">${d.name}</div>
      <div class="summary-row-value" style="font-size:16px">${fmtNum(d.total)}<span>${d.unit}</span> <span style="opacity:0.6;font-size:12px">/ ¥${Math.round(d.price).toLocaleString('ja-JP')}</span></div>
    </div>`
  ).join('') +
  `<div class="summary-row" style="margin-top:6px">
    <div class="summary-row-label" style="font-weight:700;font-size:15px">合計金額（薬価）</div>
